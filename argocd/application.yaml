apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mi-microservicio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yuliet719-beep/mi-microservicio.git
    targetRevision: main
    path: mi-chart
    helm:
      valueFiles:
      - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
